services:
  db:
    image: postgres:14.3
    restart: always
    ports: ['5432:5432']
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_HOST_AUTH_METHOD: 'trust'
    container_name: vinyls-db
    volumes:
      - ./postgres:/var/lib/postgresql/data